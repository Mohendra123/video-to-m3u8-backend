<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoGo FM | Video Converter</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8a2be2; --bg-dark: #0f0f13; --card-bg: rgba(255, 255, 255, 0.05); }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; background: var(--card-bg); border-radius: 20px; padding: 40px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--primary); margin-bottom: 5px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"], input[type="number"] { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-family: 'Poppins'; }
        .upload-area { border: 2px dashed rgba(255, 255, 255, 0.2); border-radius: 15px; padding: 30px; cursor: pointer; margin-bottom: 20px; }
        .upload-area:hover { border-color: var(--primary); }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 30px; font-weight: bold; width: 100%; cursor: pointer; font-family: 'Poppins';}
        #statusArea { display: none; margin-top: 20px; }
        #videoPlayerContainer { display: none; margin-top: 20px; }
        video { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MoGo FM Studio</h1>
        <p style="color:#aaa; font-size:14px; margin-bottom:30px;">Auto-Convert & Upload to Cloudflare R2</p>

        <form id="uploadForm">
            <div class="input-group">
                <input type="text" id="seriesName" placeholder="Series Name (e.g. Mirzapur)" required>
                <input type="number" id="episodeNum" placeholder="Episode No. (e.g. 1)" required>
                <input type="text" id="duration" placeholder="Time/Duration (Optional)">
            </div>

            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <h3 id="fileLabel">📁 Click to Select Video</h3>
                <input type="file" id="fileInput" accept="video/*" style="display:none;" required>
            </div>
            <button type="submit" id="submitBtn" class="btn">Convert & Upload to R2</button>
        </form>

        <div id="statusArea">
            <h3 style="color:#ffb703;">Processing...</h3>
            <p style="font-size: 12px; color: #888;">Converting and uploading to R2. Please don't close the tab.</p>
        </div>

        <div id="resultArea" style="display:none; margin-top:20px;">
            <p style="color: #4ade80;">✅ Uploaded to R2 & Deleted from Server!</p>
            <a id="streamLink" href="#" target="_blank" style="color: var(--primary); font-size:12px;">Link will appear here</a>
        </div>

        <div id="videoPlayerContainer">
            <video id="videoPlayer" controls></video>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');

        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) fileLabel.textContent = `Selected: ${e.target.files[0].name}`;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('statusArea').style.display = 'block';

            const formData = new FormData();
            formData.append('video', fileInput.files[0]);
            formData.append('series', document.getElementById('seriesName').value);
            formData.append('episode', document.getElementById('episodeNum').value);

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();

                if(response.ok && data.status === 'Success') {
                    document.getElementById('statusArea').style.display = 'none';
                    document.getElementById('resultArea').style.display = 'block';
                    
                    const link = document.getElementById('streamLink');
                    link.href = data.stream_url;
                    link.textContent = data.stream_url;

                    const videoPlayer = document.getElementById('videoPlayer');
                    document.getElementById('videoPlayerContainer').style.display = 'block';
                    
                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(data.stream_url);
                        hls.attachMedia(videoPlayer);
                    } else {
                        videoPlayer.src = data.stream_url;
                    }
                } else {
                    throw new Error(data.message);
                }
            } catch (error) {
                alert('Error: ' + error.message);
                window.location.reload();
            }
        });
    </script>
</body>
</html>
