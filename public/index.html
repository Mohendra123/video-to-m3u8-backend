<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoGo FM | Video to HLS Converter</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #8a2be2; /* MoGo FM Theme Color (Purple) */
            --bg-dark: #0f0f13;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-light: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(138, 43, 226, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(138, 43, 226, 0.1), transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #ff7b00, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
        }

        p.subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 40px 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.2);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(138, 43, 226, 0.05);
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 15px;
            display: block;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(138, 43, 226, 0.3);
        }

        .btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Loader & Status */
        .status-area {
            margin-top: 20px;
            display: none;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Video Player */
        #videoPlayerContainer {
            margin-top: 30px;
            display: none;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            display: block;
        }

        .success-text { color: #4ade80; font-weight: 600; margin-bottom: 10px;}
        .link-text { color: var(--primary); font-size: 0.8rem; word-break: break-all;}

    </style>
</head>
<body>

    <div class="container">
        <h1>MoGo FM</h1>
        <p class="subtitle">Premium Video to HLS (.m3u8) Converter</p>

        <form id="uploadForm">
            <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <span class="upload-icon">📁</span>
                <h3 id="fileLabel">Click or Drag video here to upload</h3>
                <p style="color: #666; font-size: 0.8rem;">Supports MP4, MOV, MKV</p>
                <input type="file" id="fileInput" name="video" accept="video/*" required>
            </div>

            <button type="submit" id="submitBtn" class="btn">Convert to .m3u8</button>
        </form>

        <div class="status-area" id="statusArea">
            <div class="loader"></div>
            <h3 id="statusText">Uploading and Converting...</h3>
            <p style="color: #888; font-size: 0.8rem;">This might take a few minutes depending on server speed.</p>
        </div>

        <div id="resultArea" style="display:none; margin-top:20px;">
            <p class="success-text">🎉 Conversion Successful!</p>
            <p style="font-size: 0.9rem;">Your HLS Stream URL:</p>
            <a id="streamLink" class="link-text" href="#" target="_blank">url will appear here</a>
        </div>

        <div id="videoPlayerContainer">
            <video id="videoPlayer" controls></video>
        </div>

    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const dropZone = document.getElementById('dropZone');
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusArea = document.getElementById('statusArea');
        const resultArea = document.getElementById('resultArea');
        const videoPlayerContainer = document.getElementById('videoPlayerContainer');
        const videoPlayer = document.getElementById('videoPlayer');
        const streamLink = document.getElementById('streamLink');

        // File Selection UI Update
        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                fileLabel.textContent = `Selected: ${e.target.files[0].name}`;
                fileLabel.style.color = '#fff';
            }
        });

        // Drag & Drop effects
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if(e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                fileLabel.textContent = `Selected: ${fileInput.files[0].name}`;
                fileLabel.style.color = '#fff';
            }
        });

        // Form Submit Handler
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if(!fileInput.files.length) return alert('Please select a video file first.');

            // UI Changes during upload
            submitBtn.style.display = 'none';
            uploadForm.style.display = 'none';
            statusArea.style.display = 'block';
            resultArea.style.display = 'none';
            videoPlayerContainer.style.display = 'none';

            const formData = new FormData();
            formData.append('video', fileInput.files[0]);

            try {
                // Backend URL (/upload kyonki frontend aur backend same server par hain)
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if(response.ok && data.status === 'Success') {
                    statusArea.style.display = 'none';
                    resultArea.style.display = 'block';
                    
                    // Create Full URL
                    const fullUrl = window.location.origin + data.stream_url;
                    streamLink.href = fullUrl;
                    streamLink.textContent = fullUrl;

                    // Setup Video Player (HLS.js)
                    videoPlayerContainer.style.display = 'block';
                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(fullUrl);
                        hls.attachMedia(videoPlayer);
                    } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                        // Native Safari Support (Aapke Mac ke liye)
                        videoPlayer.src = fullUrl;
                    }
                } else {
                    throw new Error(data.message || 'Server error');
                }
            } catch (error) {
                statusArea.style.display = 'none';
                uploadForm.style.display = 'block';
                submitBtn.style.display = 'block';
                alert('Conversion Failed: ' + error.message);
            }
        });
    </script>
</body>
</html>
